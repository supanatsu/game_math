<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Low Battle Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>High-Low Battle</h1>
        <div class="controls">
            <button class="menu-btn" onclick="initGame()">🔄 เริ่มเกมใหม่</button>
            <button class="menu-btn disabled" onclick="alert('โหมดสมการคณิตศาสตร์ จะอัปเดตในเร็วๆ นี้!')">🎮 เลือกโหมด</button>
        </div>
    </header>

    <main>
        <div id="timer" class="timer">01:00</div>
        
        <div class="arena">
            <div class="player-panel p1" id="panel-1">
                <h2>Player 1</h2>
                <div class="input-group">
                    <input type="number" id="p1-input" placeholder="ทายเลข..." autocomplete="off">
                    <button class="guess-btn" onclick="makeGuess(1)">ส่ง!</button>
                </div>
                <div class="log-container" id="p1-log"></div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="player-panel p2" id="panel-2">
                <h2>Player 2</h2>
                <div class="input-group">
                    <input type="number" id="p2-input" placeholder="ทายเลข..." autocomplete="off">
                    <button class="guess-btn" onclick="makeGuess(2)">ส่ง!</button>
                </div>
                <div class="log-container" id="p2-log"></div>
            </div>
        </div>

        <div id="status" class="status-message">กำลังรอเริ่มเกม...</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
